name: Build and Release

on:
  workflow_call:
    inputs:
      bump:
        required: false
        type: string
        default: "patch"

permissions:
  contents: write

jobs:
  create_tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.get_version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: get_version
        shell: bash
        run: |
          git fetch --tags
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          TAG=$(echo "$TAG" | tr -d '[:space:]')
          echo "[DEBUG] TAG='$TAG'"
          if [ -z "$TAG" ]; then
            MAJOR=1; MINOR=0; PATCH=0
          else
            VER=${TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<EOF
          $VER
          EOF
            if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ -z "$PATCH" ]; then
              echo "Failed to parse version! VER='$VER'"
              exit 1
            fi
          fi
          BUMP="${{ inputs.bump }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "[DEBUG] NEW_TAG='$NEW_TAG'"
          echo "tag_name=$NEW_TAG" >> $GITHUB_OUTPUT

          git tag -a $NEW_TAG -m "Release $NEW_TAG"
          git push origin $NEW_TAG
  build:
    needs: create_tag
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release]
        enable_persistence: [ON]
        bnskr: [ON, OFF]
        bnslive: [ON, OFF]
        
    name: "Build ${{ matrix.build_type }} | Persistence: ${{ matrix.enable_persistence }} | BNSKR: ${{ matrix.bnskr }} | BNSLIVE: ${{ matrix.bnslive }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Ensure Submodules are Updated
        run: git submodule update --init --recursive

      - name: Ensure Git Tags Are Available
        run: git fetch --tags

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_PERSISTENCE=${{ matrix.enable_persistence }} -DBNSKR=${{ matrix.bnskr }} -DBNSLIVE=${{matrix.bnslive }}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{ matrix.build_type }}

      - name: Upload DLLs
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ matrix.build_type }}-${{ matrix.enable_persistence }}-${{ matrix.bnskr }}-${{ matrix.bnslive }}
          path: |
            ${{github.workspace}}/build/bin/${{ matrix.build_type }}/**/*.dll

  post_build:
    needs: [build, create_tag]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download DLLs
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Debug Directory
        run: |
          echo "Current Directory:"
          pwd
          echo "Contents:"
          ls -R artifacts
        shell: bash

      - name: Set DLL paths output
        id: find_dlls
        run: |
          echo "dll_path_eu=artifacts/build-Release-ON-OFF-OFF/itemswap_NEO.dll" >> $GITHUB_OUTPUT
          echo "dll_path_live_eu=artifacts/build-Release-ON-OFF-ON/itemswap_LIVE.dll" >> $GITHUB_OUTPUT
          echo "dll_path_kr=artifacts/build-Release-ON-ON-OFF/itemswap_NEO_KR.dll" >> $GITHUB_OUTPUT
          echo "dll_path_live_kr=artifacts/build-Release-ON-ON-ON/itemswap_LIVE_KR.dll" >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1 || true)
          if [ -z "$PREV_TAG" ]; then
            git log --oneline > release_notes.txt
          else
            git log --oneline "$PREV_TAG"..HEAD > release_notes.txt
          fi
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          cat release_notes.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create_tag.outputs.tag_name }}
          name: Release ${{ needs.create_tag.outputs.tag_name }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            ${{ steps.find_dlls.outputs.dll_path_eu }}
            ${{ steps.find_dlls.outputs.dll_path_kr }}
            ${{ steps.find_dlls.outputs.dll_path_live_eu }}
            ${{ steps.find_dlls.outputs.dll_path_live_kr }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}